<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>Color Picker</title>
  <style>
    :root {
      --ink: #0e1013;
      --panel: #16191d;
      --panel-2: #1c2026;
      --line: #2a2f37;
      --text: #e8e9eb;
      --muted: #8b919b;
      --mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --accent: #e8e9eb;
      --picked: #808080;
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--ink);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 60px;
    }

    header {
      width: 100%;
      max-width: 1100px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 10px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 0;
    }

    h1 span {
      color: var(--muted);
      font-weight: 500;
    }

    .swatch-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--picked);
      margin-right: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      vertical-align: middle;
      transition: background 0.08s ease;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      font-family: var(--mono);
    }

    main {
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
      }
    }

    .stage {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stage.drag-over {
      outline: 2px dashed var(--muted);
      outline-offset: -8px;
    }

    #canvasWrap {
      position: relative;
      display: none;
      line-height: 0;
    }

    #canvasWrap.active {
      display: block;
    }

    canvas#img {
      max-width: 100%;
      display: block;
      cursor: crosshair;
      image-rendering: pixelated;
    }

    .dropzone {
      text-align: center;
      padding: 60px 30px;
      cursor: pointer;
    }

    .dropzone svg {
      width: 36px;
      height: 36px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .dropzone p {
      margin: 4px 0;
      color: var(--text);
      font-size: 15px;
    }

    .dropzone p.sub {
      color: var(--muted);
      font-size: 13px;
      font-family: var(--mono);
    }

    input[type=file] {
      display: none;
    }

    /* loupe */
    #loupe {
      position: fixed;
      width: 150px;
      height: 150px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
      pointer-events: none;
      display: none;
      overflow: hidden;
      z-index: 50;
      background: var(--panel);
    }

    #loupe canvas {
      position: absolute;
      image-rendering: pixelated;
    }

    #loupe .loupe-label {
      position: absolute;
      top: 6px;
      left: 8px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.65);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
      z-index: 2;
      pointer-events: none;
    }


    /* side panel */
    .panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
    }

    .current-color {
      width: 100%;
      height: 88px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--picked);
      margin-bottom: 14px;
      background-image:
        linear-gradient(45deg, #333 25%, transparent 25%),
        linear-gradient(-45deg, #333 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #333 75%),
        linear-gradient(-45deg, transparent 75%, #333 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
      position: relative;
      overflow: hidden;
    }

    .current-color .fill {
      position: absolute;
      inset: 0;
      background: inherit;
    }

    .code-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 8px 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      margin-bottom: 8px;
      background: var(--panel-2);
      transition: border-color 0.12s ease;
    }

    .code-row:hover {
      border-color: var(--muted);
    }

    .code-row:last-child {
      margin-bottom: 0;
    }

    .code-row .label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      width: 34px;
      flex-shrink: 0;
    }

    .code-row .value {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      flex: 1;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .copy-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      flex-shrink: 0;
      margin-left: 8px;
      border: none;
      border-radius: 5px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.12s ease, color 0.12s ease;
    }

    .copy-btn:hover {
      background: #262b33;
      color: var(--text);
    }

    .copy-btn svg {
      width: 14px;
      height: 14px;
    }

    .copy-btn .icon-check {
      display: none;
    }

    .copy-btn.copied {
      color: #6fcf97;
    }

    .copy-btn.copied .icon-copy {
      display: none;
    }

    .copy-btn.copied .icon-check {
      display: block;
    }

    .card h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 0 12px;
      font-weight: 600;
    }

    .btn {
      width: 100%;
      padding: 9px 12px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.12s ease, background 0.12s ease;
    }

    .btn:hover {
      border-color: var(--muted);
      background: #20242b;
    }

    .zoom-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .zoom-row input[type=range] {
      flex: 1;
    }

    .zoom-row .zoom-val {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      width: 32px;
      text-align: right;
    }
  </style>
</head>

<body>

  <header>
    <h1><span class="swatch-dot" id="headDot"></span>Pixel Dropper <span>— image color picker</span></h1>
    <div class="hint" id="coordHint">no image loaded</div>
  </header>

  <main>
    <div class="stage" id="stage">
      <div class="dropzone" id="dropzone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <path d="M21 15l-5-5L5 21" />
        </svg>
        <p>Drop an image here, or click to browse</p>
        <p class="sub">PNG · JPG · WEBP — stays in your browser</p>
      </div>
      <div id="canvasWrap">
        <canvas id="img"></canvas>
      </div>
      <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="panel">
      <div class="card">
        <h2>Picked color</h2>
        <div class="current-color" id="currentColor">
          <div class="fill" id="currentFill"></div>
        </div>
        <div class="code-row" id="rowHex">
          <span class="label">HEX</span>
          <span class="value" id="valHex">—</span>
          <button class="copy-btn" data-copy="hex" title="Copy HEX" aria-label="Copy HEX">
            <svg class="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="12" height="12" rx="2" />
              <path d="M5 15V5a2 2 0 0 1 2-2h10" />
            </svg>
            <svg class="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12" />
            </svg>
          </button>
        </div>
        <div class="code-row" id="rowRgb">
          <span class="label">RGB</span>
          <span class="value" id="valRgb">—</span>
          <button class="copy-btn" data-copy="rgb" title="Copy RGB" aria-label="Copy RGB">
            <svg class="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="12" height="12" rx="2" />
              <path d="M5 15V5a2 2 0 0 1 2-2h10" />
            </svg>
            <svg class="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12" />
            </svg>
          </button>
        </div>
        <div class="code-row" id="rowHsl">
          <span class="label">HSL</span>
          <span class="value" id="valHsl">—</span>
          <button class="copy-btn" data-copy="hsl" title="Copy HSL" aria-label="Copy HSL">
            <svg class="icon-copy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="12" height="12" rx="2" />
              <path d="M5 15V5a2 2 0 0 1 2-2h10" />
            </svg>
            <svg class="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12" />
            </svg>
          </button>
        </div>
      </div>

      <div class="card">
        <h2>Zoom</h2>
        <div class="zoom-row">
          <input type="range" id="zoomSlider" min="2" max="16" value="6" step="1">
          <span class="zoom-val" id="zoomVal">6×</span>
        </div>
      </div>

      <button class="btn" id="newImageBtn" style="display:none;"><svg viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
          style="width:14px;height:14px;vertical-align:-2px;margin-right:6px;">
          <path d="M21 12a9 9 0 1 1-2.64-6.36" />
          <polyline points="21 3 21 9 15 9" />
        </svg>Load a different image</button>
    </div>
  </main>

  <div id="loupe"><span class="loupe-label">Zoom</span><canvas id="loupeCanvas"></canvas></div>

  <script>
    (function () {
      const stage = document.getElementById('stage');
      const dropzone = document.getElementById('dropzone');
      const canvasWrap = document.getElementById('canvasWrap');
      const canvas = document.getElementById('img');
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      const fileInput = document.getElementById('fileInput');
      const coordHint = document.getElementById('coordHint');
      const headDot = document.getElementById('headDot');
      const currentColor = document.getElementById('currentColor');
      const currentFill = document.getElementById('currentFill');
      const valHex = document.getElementById('valHex');
      const valRgb = document.getElementById('valRgb');
      const valHsl = document.getElementById('valHsl');
      const loupe = document.getElementById('loupe');
      const loupeCanvas = document.getElementById('loupeCanvas');
      const loupeCtx = loupeCanvas.getContext('2d');
      const zoomSlider = document.getElementById('zoomSlider');
      const zoomVal = document.getElementById('zoomVal');
      const newImageBtn = document.getElementById('newImageBtn');

      let zoom = 6;
      let naturalW = 0, naturalH = 0;
      let lastPicked = null;

      const LOUPE_PX = 150; // loupe diameter in css px, must match CSS #loupe width/height
      function sampleCount() {
        // derive an odd sample window size from the zoom level so the
        // slider actually changes magnification, and higher zoom = fewer
        // source pixels shown = more magnified
        let n = Math.round(LOUPE_PX / zoom / 4) * 2 + 1; // keep it odd
        return Math.max(3, Math.min(31, n));
      }

      function rgbToHex(r, g, b) {
        return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
      }
      function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;
        if (max === min) { h = s = 0; }
        else {
          const d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
          switch (max) {
            case r: h = (g - b) / d + (g < b ? 6 : 0); break;
            case g: h = (b - r) / d + 2; break;
            case b: h = (r - g) / d + 4; break;
          }
          h /= 6;
        }
        return `hsl(${Math.round(h * 360)}, ${Math.round(s * 100)}%, ${Math.round(l * 100)}%)`;
      }

      function loadImage(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const im = new Image();
          im.onload = () => {
            naturalW = im.naturalWidth;
            naturalH = im.naturalHeight;
            canvas.width = naturalW;
            canvas.height = naturalH;
            ctx.drawImage(im, 0, 0);
            dropzone.style.display = 'none';
            canvasWrap.classList.add('active');
            newImageBtn.style.display = 'block';
            coordHint.textContent = `${naturalW} × ${naturalH}px — move to sample, click to save`;
          };
          im.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      dropzone.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => loadImage(e.target.files[0]));

      ['dragenter', 'dragover'].forEach(evt => {
        stage.addEventListener(evt, (e) => { e.preventDefault(); stage.classList.add('drag-over'); });
      });
      ['dragleave', 'drop'].forEach(evt => {
        stage.addEventListener(evt, (e) => { e.preventDefault(); stage.classList.remove('drag-over'); });
      });
      stage.addEventListener('drop', (e) => {
        const file = e.dataTransfer.files[0];
        loadImage(file);
      });

      newImageBtn.addEventListener('click', () => {
        dropzone.style.display = 'flex';
        canvasWrap.classList.remove('active');
        newImageBtn.style.display = 'none';
        coordHint.textContent = 'no image loaded';
        fileInput.value = '';
      });

      function getPixel(x, y) {
        x = Math.max(0, Math.min(naturalW - 1, x));
        y = Math.max(0, Math.min(naturalH - 1, y));
        const d = ctx.getImageData(x, y, 1, 1).data;
        return { r: d[0], g: d[1], b: d[2] };
      }

      function updateReadout(px) {
        const hex = rgbToHex(px.r, px.g, px.b);
        const rgb = `rgb(${px.r}, ${px.g}, ${px.b})`;
        const hsl = rgbToHsl(px.r, px.g, px.b);
        currentFill.style.background = hex;
        headDot.style.background = hex;
        document.documentElement.style.setProperty('--picked', hex);
        valHex.textContent = hex;
        valRgb.textContent = rgb;
        valHsl.textContent = hsl;
        lastPicked = { hex, rgb, hsl, r: px.r, g: px.g, b: px.b };
      }

      function drawLoupe(clientX, clientY, pixelX, pixelY) {
        const SAMPLE = sampleCount();
        const half = Math.floor(SAMPLE / 2); // index of the center cell — must match the picked pixel exactly

        loupe.style.display = 'block';

        // position the loupe near the cursor but clamped to the viewport,
        // and flip below the cursor if there isn't room above it
        const gap = 20;
        let left = clientX - LOUPE_PX / 2;
        left = Math.max(8, Math.min(window.innerWidth - LOUPE_PX - 8, left));
        let top = clientY - LOUPE_PX - gap;
        if (top < 8) top = clientY + gap;
        loupe.style.left = left + 'px';
        loupe.style.top = top + 'px';

        loupeCanvas.width = LOUPE_PX;
        loupeCanvas.height = LOUPE_PX;
        loupeCtx.imageSmoothingEnabled = false;

        // pixelX/pixelY is the exact source pixel under the cursor (already floored)
        // clamp the sample window so it stays in-bounds, but keep the center
        // cell mapped to pixelX/pixelY whenever possible
        let sx = pixelX - half;
        let sy = pixelY - half;
        sx = Math.max(0, Math.min(naturalW - SAMPLE, sx));
        sy = Math.max(0, Math.min(naturalH - SAMPLE, sy));
        const sw = Math.min(SAMPLE, naturalW);
        const sh = Math.min(SAMPLE, naturalH);

        loupeCtx.clearRect(0, 0, LOUPE_PX, LOUPE_PX);
        loupeCtx.drawImage(canvas, sx, sy, sw, sh, 0, 0, LOUPE_PX, LOUPE_PX);

        // crosshair grid
        loupeCtx.strokeStyle = 'rgba(255,255,255,0.15)';
        loupeCtx.lineWidth = 1;
        const cell = LOUPE_PX / SAMPLE;
        for (let i = 1; i < SAMPLE; i++) {
          loupeCtx.beginPath();
          loupeCtx.moveTo(i * cell, 0); loupeCtx.lineTo(i * cell, LOUPE_PX);
          loupeCtx.moveTo(0, i * cell); loupeCtx.lineTo(LOUPE_PX, i * cell);
          loupeCtx.stroke();
        }

        // highlight the exact cell representing the picked pixel
        // (offset from center only if the window got clamped near an image edge)
        const hiCol = pixelX - sx;
        const hiRow = pixelY - sy;
        if (hiCol >= 0 && hiCol < SAMPLE && hiRow >= 0 && hiRow < SAMPLE) {
          loupeCtx.strokeStyle = 'rgba(255,255,255,0.95)';
          loupeCtx.lineWidth = 2;
          loupeCtx.strokeRect(hiCol * cell + 1, hiRow * cell + 1, cell - 2, cell - 2);
        }
      }

      function handleMove(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = naturalW / rect.width;
        const scaleY = naturalH / rect.height;
        const imgX = (e.clientX - rect.left) * scaleX;
        const imgY = (e.clientY - rect.top) * scaleY;

        if (imgX < 0 || imgY < 0 || imgX >= naturalW || imgY >= naturalH) {
          loupe.style.display = 'none';
          return;
        }

        const pixelX = Math.floor(imgX);
        const pixelY = Math.floor(imgY);
        // hover only drives the loupe preview — hex/rgb/hsl update on click
        drawLoupe(e.clientX, e.clientY, pixelX, pixelY);
        coordHint.textContent = `x:${pixelX} y:${pixelY} — click to sample`;
      }

      canvas.addEventListener('mousemove', handleMove);
      canvas.addEventListener('mouseleave', () => { loupe.style.display = 'none'; });

      canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = naturalW / rect.width;
        const scaleY = naturalH / rect.height;
        const imgX = (e.clientX - rect.left) * scaleX;
        const imgY = (e.clientY - rect.top) * scaleY;
        if (imgX < 0 || imgY < 0 || imgX >= naturalW || imgY >= naturalH) return;

        const pixelX = Math.floor(imgX);
        const pixelY = Math.floor(imgY);
        const px = getPixel(pixelX, pixelY);
        updateReadout(px);
        coordHint.textContent = `x:${pixelX} y:${pixelY} — ${valHex.textContent}`;
      });

      zoomSlider.addEventListener('input', () => {
        zoom = parseInt(zoomSlider.value, 10);
        zoomVal.textContent = zoom + '×';
      });

      function showCopied(btn) {
        btn.classList.add('copied');
        clearTimeout(btn._copyTimer);
        btn._copyTimer = setTimeout(() => btn.classList.remove('copied'), 1200);
      }

      function fallbackCopy(text) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.top = '-1000px';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        let ok = false;
        try { ok = document.execCommand('copy'); } catch (err) { ok = false; }
        document.body.removeChild(ta);
        return ok;
      }

      function copyValue(btn) {
        const row = btn.closest('.code-row');
        const text = row.querySelector('.value').textContent;
        if (text === '—') return;

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text)
            .then(() => showCopied(btn))
            .catch(() => {
              if (fallbackCopy(text)) showCopied(btn);
            });
        } else {
          if (fallbackCopy(text)) showCopied(btn);
        }
      }
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => copyValue(btn));
      });

    })();
  </script>

</body>

</html>
